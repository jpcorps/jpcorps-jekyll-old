# The Site Configuration
theme: jekyll-theme-chirpy
lang: ko-KR
timezone: Asia/Seoul
title: "대충 살아가는 게임개발자"
tagline: "이글루스와 티스토리를 정처없이 떠돌아다니다 여기로 옮겨옴"
description: >-
  TA 대마왕의 대충 살아가는 게임개발자 블로그

url: "https://jpcorps.github.io"
github:
  username: jpcorps

social:
  name: 대마왕
  email: jpcorp@hanmail.net
  links:
    - https://github.com/jpcorps

theme_mode: 
avatar: /Face.png
toc: true

comments:
  provider: giscus
  giscus:
    repo: jpcorps/jpcorps.github.io
    repo_id: R_kgDOSOA18Q
    category: General
    category_id: DIC_kwDOSOA18c4C7-G6
    mapping: pathname
    strict: 0
    input_position: bottom
    lang: ko
    reactions_enabled: 1

paginate: 10
baseurl: ""
excerpt_separator: "<!-- more -->"

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:year-:month-:day-:title/ # 날짜 추가로 충돌 방지
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/ # 탭 메뉴는 기존 주소 유지

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

# Search settings (빌드 속도 향상의 핵심)
search:
  hits: 5
  include_body: false # 본문 전체를 인덱싱하지 않아 2,143개 글 처리 속도 비약적 향상
